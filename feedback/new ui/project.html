<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Projects — Avishek Devnath</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{
  --cream:#f0ece3;--cream-dark:#e8e2d6;--cream-deeper:#ddd5c5;
  --sand:#c9b99a;--warm-brown:#8b7355;--deep-brown:#4a3728;
  --ink:#2a2118;--orange:#d4622a;--teal:#3a7d6e;
  --blue:#2d5a8e;--white:#faf8f4;--muted:#8a7a6a;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',sans-serif;background:var(--cream);color:var(--ink);min-height:100vh;padding:5rem 1.5rem 6rem;}
.projects-section{max-width:1100px;margin:0 auto;}

.p-header{text-align:center;margin-bottom:3rem;}
.p-eyebrow{font-family:'DM Mono',monospace;font-size:.68rem;letter-spacing:.25em;text-transform:uppercase;color:var(--orange);margin-bottom:.75rem;display:flex;align-items:center;justify-content:center;gap:.7rem;}
.p-eyebrow::before,.p-eyebrow::after{content:'';width:2rem;height:1px;background:var(--orange);opacity:.5;}
.p-title{font-family:'Cormorant Garamond',serif;font-size:clamp(2.2rem,5vw,3.6rem);font-weight:300;line-height:1.05;color:var(--ink);margin-bottom:.9rem;}
.p-title em{font-style:italic;color:var(--warm-brown);}
.p-sub{font-size:.9rem;color:var(--muted);max-width:60ch;margin:0 auto;line-height:1.75;font-weight:300;}

.controls{display:flex;align-items:center;gap:.75rem;flex-wrap:wrap;margin-bottom:1.5rem;}
.search-wrap{position:relative;flex:1;min-width:180px;max-width:300px;}
.search-wrap svg{position:absolute;left:.85rem;top:50%;transform:translateY(-50%);width:14px;height:14px;color:var(--muted);pointer-events:none;}
.search-input{width:100%;padding:.5rem .9rem .5rem 2.25rem;border:1.5px solid var(--cream-deeper);border-radius:2rem;background:var(--white);font-family:'DM Sans',sans-serif;font-size:.83rem;color:var(--ink);outline:none;transition:border-color .2s,box-shadow .2s;}
.search-input::placeholder{color:var(--muted);}
.search-input:focus{border-color:var(--sand);box-shadow:0 0 0 3px rgba(201,185,154,.2);}
.filter-pills{display:flex;gap:.4rem;flex-wrap:wrap;}
.pill{display:inline-flex;align-items:center;gap:.35rem;padding:.35rem .82rem;border-radius:2rem;font-size:.8rem;font-weight:500;cursor:pointer;border:1.5px solid var(--cream-deeper);background:var(--white);color:var(--muted);transition:all .2s;white-space:nowrap;font-family:'DM Sans',sans-serif;}
.pill:hover{border-color:var(--sand);color:var(--ink);}
.pill.active{background:var(--ink);color:var(--white);border-color:var(--ink);}
.pill-count{font-family:'DM Mono',monospace;font-size:.58rem;opacity:.6;}
.controls-right{display:flex;align-items:center;gap:.6rem;margin-left:auto;}
.result-count{font-family:'DM Mono',monospace;font-size:.65rem;color:var(--muted);white-space:nowrap;}
.view-toggle{display:flex;gap:2px;background:var(--cream-dark);border-radius:.5rem;padding:3px;border:1px solid var(--cream-deeper);}
.vt-btn{width:30px;height:28px;border:none;background:transparent;border-radius:.35rem;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--muted);transition:all .2s;}
.vt-btn.active{background:var(--white);color:var(--ink);box-shadow:0 1px 3px rgba(0,0,0,.08);}
.vt-btn svg{width:14px;height:14px;}

.project-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:1.15rem;}
.project-grid.list-view{grid-template-columns:1fr;}
.project-grid.list-view .proj-card{flex-direction:row;}
.project-grid.list-view .card-thumb{width:185px;flex-shrink:0;border-radius:.85rem 0 0 .85rem;}
.project-grid.list-view .card-thumb .card-thumb-inner{height:100%;min-height:130px;}
.project-grid.list-view .card-accent{display:none;}

.proj-card{background:var(--white);border:1px solid var(--cream-deeper);border-radius:.85rem;overflow:hidden;display:flex;flex-direction:column;transition:border-color .3s,box-shadow .3s,transform .3s;position:relative;}
.proj-card:hover{border-color:var(--sand);box-shadow:0 8px 28px rgba(74,55,40,.1);transform:translateY(-3px);}
.project-grid.list-view .proj-card:hover{transform:translateX(3px) translateY(0);}

.feat-star{position:absolute;top:.75rem;left:.75rem;z-index:3;width:24px;height:24px;border-radius:50%;background:rgba(255,255,255,.92);backdrop-filter:blur(6px);display:flex;align-items:center;justify-content:center;font-size:.65rem;box-shadow:0 2px 6px rgba(0,0,0,.12);}
.card-thumb{position:relative;overflow:hidden;background:var(--cream-deeper);flex-shrink:0;}
.card-thumb-inner{height:155px;overflow:hidden;}
.thumb-placeholder{width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-size:2.8rem;opacity:.14;background:linear-gradient(135deg,#d8d0c0,var(--cream-deeper));}
.thumb-cat{position:absolute;bottom:.6rem;left:.6rem;font-family:'DM Mono',monospace;font-size:.55rem;letter-spacing:.08em;text-transform:uppercase;padding:.17rem .58rem;border-radius:2rem;background:rgba(42,33,24,.72);color:rgba(255,255,255,.88);backdrop-filter:blur(6px);}

.card-accent{height:3px;width:100%;flex-shrink:0;}
.acc-orange{background:linear-gradient(90deg,var(--orange),#f5a87a);}
.acc-teal{background:linear-gradient(90deg,var(--teal),#6ab8ae);}
.acc-blue{background:linear-gradient(90deg,var(--blue),#6a9fd8);}
.acc-brown{background:linear-gradient(90deg,var(--deep-brown),var(--warm-brown));}
.acc-purple{background:linear-gradient(90deg,#7c3aed,#a855f7);}

.card-content{padding:1.1rem 1.2rem;flex:1;display:flex;flex-direction:column;gap:.58rem;}
.card-name{font-family:'Cormorant Garamond',serif;font-size:1.1rem;font-weight:600;color:var(--ink);line-height:1.2;transition:color .2s;}
.proj-card:hover .card-name{color:var(--orange);}
.card-desc{font-size:.79rem;line-height:1.65;color:var(--muted);font-weight:300;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;flex:1;}
.card-tags{display:flex;flex-wrap:wrap;gap:.36rem;align-items:center;}
.tech-tag{font-family:'DM Mono',monospace;font-size:.57rem;letter-spacing:.03em;padding:.15rem .55rem;border-radius:2rem;border:1px solid var(--cream-deeper);background:var(--cream-dark);color:var(--warm-brown);white-space:nowrap;}
.tag-more{font-family:'DM Mono',monospace;font-size:.57rem;color:var(--muted);}

.card-footer{display:flex;align-items:center;gap:.55rem;flex-wrap:wrap;padding:.82rem 1.2rem;border-top:1px solid var(--cream-deeper);background:rgba(240,236,227,.35);}
.foot-link{display:inline-flex;align-items:center;gap:.28rem;font-size:.73rem;font-weight:500;color:var(--muted);text-decoration:none;transition:color .2s;}
.foot-link:hover{color:var(--ink);}
.foot-link svg{width:11px;height:11px;flex-shrink:0;}
.foot-sep{width:1px;height:11px;background:var(--cream-deeper);}
.foot-details{margin-left:auto;display:inline-flex;align-items:center;gap:.28rem;font-size:.73rem;font-weight:500;color:var(--orange);text-decoration:none;opacity:0;transform:translateX(-4px);transition:opacity .25s,transform .25s;}
.proj-card:hover .foot-details{opacity:1;transform:translateX(0);}
.foot-details svg{width:11px;height:11px;}

.empty-state{grid-column:1/-1;text-align:center;padding:4rem;color:var(--muted);}
.empty-state p{font-size:.88rem;margin-top:.4rem;font-weight:300;}

@media(max-width:700px){
  .controls{flex-direction:column;align-items:stretch;}
  .search-wrap{max-width:100%;}
  .controls-right{justify-content:space-between;}
  .project-grid.list-view .proj-card{flex-direction:column;}
  .project-grid.list-view .card-thumb{width:100%;border-radius:.85rem .85rem 0 0;}
  .project-grid.list-view .card-accent{display:block;}
}
</style>
</head>
<body>
<section class="projects-section">

<div class="p-header">
  <p class="p-eyebrow">Browse My Recent</p>
  <h2 class="p-title">My <em>Projects</em></h2>
  <p class="p-sub">Explore a curated selection of shipped work across web apps, tools, and experiments. Filter by technology, category, or status.</p>
</div>

<div class="controls">
  <div class="search-wrap">
    <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/></svg>
    <input class="search-input" id="searchInput" type="text" placeholder="Search projects…">
  </div>
  <div class="filter-pills" id="filterPills">
    <button class="pill active" data-cat="all">All <span class="pill-count">12</span></button>
    <button class="pill" data-cat="Web Development">Web <span class="pill-count">4</span></button>
    <button class="pill" data-cat="NPM Package">NPM <span class="pill-count">2</span></button>
    <button class="pill" data-cat="Python Package">Python <span class="pill-count">4</span></button>
    <button class="pill" data-cat="Machine Learning">ML <span class="pill-count">2</span></button>
  </div>
  <div class="controls-right">
    <span class="result-count" id="resultCount">Showing 12 projects</span>
    <div class="view-toggle">
      <button class="vt-btn active" id="gridBtn" title="Grid view">
        <svg fill="currentColor" viewBox="0 0 16 16"><rect x="1" y="1" width="6" height="6" rx="1"/><rect x="9" y="1" width="6" height="6" rx="1"/><rect x="1" y="9" width="6" height="6" rx="1"/><rect x="9" y="9" width="6" height="6" rx="1"/></svg>
      </button>
      <button class="vt-btn" id="listBtn" title="List view">
        <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 10h16M4 14h16M4 18h16"/></svg>
      </button>
    </div>
  </div>
</div>

<div class="project-grid" id="projectGrid"></div>
<div class="empty-state" id="emptyState" style="display:none">
  <div style="font-size:2rem;opacity:.22">🔍</div>
  <p>No projects match your search.</p>
</div>

</section>
<script>
const GH  = `<svg fill="currentColor" viewBox="0 0 24 24" width="11" height="11"><path d="M12 2A10 10 0 002 12c0 4.42 2.87 8.17 6.84 9.5.5.08.66-.23.66-.5v-1.69c-2.77.6-3.36-1.34-3.36-1.34-.46-1.16-1.11-1.47-1.11-1.47-.91-.62.07-.6.07-.6 1 .07 1.53 1.03 1.53 1.03.87 1.52 2.34 1.07 2.91.83.09-.65.35-1.09.63-1.34-2.22-.25-4.55-1.11-4.55-4.92 0-1.11.38-2 1.03-2.71-.1-.25-.45-1.29.1-2.64 0 0 .84-.27 2.75 1.02.79-.22 1.65-.33 2.5-.33.85 0 1.71.11 2.5.33 1.91-1.29 2.75-1.02 2.75-1.02.55 1.35.2 2.39.1 2.64.65.71 1.03 1.6 1.03 2.71 0 3.82-2.34 4.66-4.57 4.91.36.31.69.92.69 1.85V21c0 .27.16.59.67.5C19.14 20.16 22 16.42 22 12A10 10 0 0012 2z"/></svg>`;
const EXT = `<svg fill="none" stroke="currentColor" viewBox="0 0 24 24" width="11" height="11"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 6H6a2 2 0 00-2 2v10a2 2 0 002 2h10a2 2 0 002-2v-4M14 4h6m0 0v6m0-6L10 14"/></svg>`;
const ARR = `<svg fill="none" stroke="currentColor" viewBox="0 0 24 24" width="11" height="11"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 8l4 4m0 0l-4 4m4-4H3"/></svg>`;

const projects = [
  { name:'BrainScale-CRM',         cat:'Web Development',  emoji:'🏢', accent:'acc-orange', featured:true,
    desc:'A modern multi-tenant CRM for managing students and customers with real-world RBAC, auth flows, and background job processing.',
    tags:['Next.js 16','Node.js','Prisma'], extra:3, demo:true },
  { name:'IdentiFace',              cat:'Machine Learning', emoji:'🎭', accent:'acc-purple', featured:true,
    desc:'A closed-set, consent-based face recognition system using MTCNN + FaceNet embeddings with FAISS vector search for fast identity matching.',
    tags:['MTCNN','FaceNet','FAISS'], extra:3, demo:false },
  { name:'sms-web',                 cat:'Web Development',  emoji:'🏫', accent:'acc-teal', featured:true,
    desc:'A production-ready Student Management System with attendance tracking, grading, fee collection, and role-based access control.',
    tags:['Next.js 15','JWT','Tailwind'], extra:2, demo:false },
  { name:'Ai-Toolbox',              cat:'Web Development',  emoji:'🧰', accent:'acc-blue', featured:true,
    desc:'A comprehensive AI tools platform built with Next.js 15, aggregating text, image, and code utilities into a single clean interface.',
    tags:['Next.js','React','TypeScript'], extra:1, demo:true },
  { name:'FoodMart — Ecommerce',    cat:'Web Development',  emoji:'🛒', accent:'acc-orange', featured:false,
    desc:"A client-side e-commerce app built with Next.js and React, featuring cart, checkout flow, and product management.",
    tags:['Next.js','React','JavaScript'], extra:2, demo:false },
  { name:'package-detector',        cat:'NPM Package',      emoji:'📦', accent:'acc-teal', featured:false,
    desc:"Performance-focused CLI for auditing npm dependencies — detects unused, outdated, and duplicate packages in seconds.",
    tags:['Node.js','JavaScript','CLI'], extra:0, demo:false },
  { name:'Project Health',          cat:'NPM Package',      emoji:'🩺', accent:'acc-teal', featured:false,
    desc:'A fast, zero-config CLI for assessing Node.js project quality — checks coverage, dependency hygiene, and CI readiness.',
    tags:['Node.js','TypeScript','JavaScript'], extra:0, demo:false },
  { name:'quickstore',              cat:'Python Package',   emoji:'🗄️', accent:'acc-brown', featured:false,
    desc:'A developer-friendly, file-backed key-value database with no external dependencies — fast local persistence for scripts.',
    tags:['Python','Pip','FileDB'], extra:6, demo:false },
  { name:'xerror',                  cat:'Python Package',   emoji:'⚠️', accent:'acc-brown', featured:false,
    desc:'A developer-focused CLI and library that analyzes error logs, groups tracebacks, and surfaces root-cause summaries.',
    tags:['Python 3.10+','CLI','Error Analysis'], extra:6, demo:false },
  { name:'py-trashguard',           cat:'Python Package',   emoji:'🗑️', accent:'acc-brown', featured:false,
    desc:"Prevents accidental data loss by moving files to a safe .trash/ directory instead of permanent deletion, with restore support.",
    tags:['Python','CLI','Filesystem Utilities'], extra:3, demo:false },
  { name:'pyonesend',               cat:'Python Package',   emoji:'📤', accent:'acc-brown', featured:false,
    desc:"Share files instantly without cloud services — direct peer-to-peer transfer over local network with a single command.",
    tags:['Python','CLI','File Transfer'], extra:6, demo:false },
  { name:'py-humantime',            cat:'Python Package',   emoji:'⏱️', accent:'acc-brown', featured:false,
    desc:'A lightweight, dependency-free utility for turning raw seconds and timestamps into natural human-readable time strings.',
    tags:['Python','CLI','Time Conversion'], extra:4, demo:false },
];

function render() {
  const grid = document.getElementById('projectGrid');
  grid.innerHTML = '';
  projects.forEach(p => {
    const tags = p.tags.map(t => `<span class="tech-tag">${t}</span>`).join('');
    const more = p.extra ? `<span class="tag-more">+${p.extra}</span>` : '';
    const star = p.featured ? `<div class="feat-star">⭐</div>` : '';
    const demo = p.demo ? `<div class="foot-sep"></div><a href="#" class="foot-link">${EXT} Demo</a>` : '';
    grid.insertAdjacentHTML('beforeend', `
      <div class="proj-card" data-cat="${p.cat}" data-search="${p.name.toLowerCase()} ${p.tags.join(' ').toLowerCase()} ${p.desc.toLowerCase()}">
        ${star}
        <div class="card-thumb">
          <div class="card-thumb-inner"><div class="thumb-placeholder">${p.emoji}</div></div>
          <span class="thumb-cat">${p.cat}</span>
        </div>
        <div class="card-accent ${p.accent}"></div>
        <div class="card-content">
          <div class="card-name">${p.name}</div>
          <div class="card-desc">${p.desc}</div>
          <div class="card-tags">${tags}${more}</div>
        </div>
        <div class="card-footer">
          <a href="#" class="foot-link">${GH} Code</a>
          ${demo}
          <a href="#" class="foot-details">View Details ${ARR}</a>
        </div>
      </div>`);
  });
}

render();

let activeCat = 'all';
const pills   = [...document.querySelectorAll('.pill')];
const search  = document.getElementById('searchInput');
const countEl = document.getElementById('resultCount');
const emptyEl = document.getElementById('emptyState');
const gridEl  = document.getElementById('projectGrid');

function filter() {
  const q = search.value.toLowerCase().trim();
  const cards = [...gridEl.querySelectorAll('.proj-card')];
  let n = 0;
  cards.forEach(c => {
    const catOk = activeCat === 'all' || c.dataset.cat === activeCat;
    const txtOk = !q || c.dataset.search.includes(q);
    c.style.display = catOk && txtOk ? '' : 'none';
    if (catOk && txtOk) n++;
  });
  countEl.textContent = `Showing ${n} project${n !== 1 ? 's' : ''}`;
  emptyEl.style.display = n === 0 ? '' : 'none';
}

pills.forEach(p => p.addEventListener('click', () => {
  pills.forEach(x => x.classList.remove('active'));
  p.classList.add('active');
  activeCat = p.dataset.cat;
  filter();
}));
search.addEventListener('input', filter);

document.getElementById('gridBtn').addEventListener('click', function(){
  gridEl.classList.remove('list-view');
  this.classList.add('active');
  document.getElementById('listBtn').classList.remove('active');
});
document.getElementById('listBtn').addEventListener('click', function(){
  gridEl.classList.add('list-view');
  this.classList.add('active');
  document.getElementById('gridBtn').classList.remove('active');
});
</script>
</body>
</html>

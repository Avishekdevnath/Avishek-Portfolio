<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Avishek Devnath</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,200;0,300;0,600;1,200;1,300;1,600&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet">
<style>
:root{
  --cream:#f0ece3;--ink:#2a2118;--orange:#d4622a;
  --warm-brown:#8b7355;--muted:#8a7a6a;--sand:#c9b99a;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html,body{width:100%;height:100%;overflow:hidden;background:var(--ink);}

/* ══════════════════════════
   LOADER SHELL
══════════════════════════ */
#loader{
  position:fixed;inset:0;z-index:9999;
  background:var(--ink);
  display:flex;align-items:center;justify-content:center;
  overflow:hidden;
}

/* ── grain overlay ── */
#loader::after{
  content:'';position:absolute;inset:-50%;
  width:200%;height:200%;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
  pointer-events:none;opacity:.5;
  animation:grain 0.5s steps(2) infinite;
  z-index:1;
}
@keyframes grain{
  0%,100%{transform:translate(0,0)}
  25%{transform:translate(-2%,-3%)}
  50%{transform:translate(2%,1%)}
  75%{transform:translate(-1%,3%)}
}

/* ── decorative corner lines ── */
.corner{position:absolute;width:40px;height:40px;}
.corner::before,.corner::after{content:'';position:absolute;background:rgba(139,115,85,.3);}
.corner::before{width:1px;height:100%;}
.corner::after{width:100%;height:1px;}
.corner.tl{top:2rem;left:2rem;}
.corner.tr{top:2rem;right:2rem;transform:scaleX(-1);}
.corner.bl{bottom:2rem;left:2rem;transform:scaleY(-1);}
.corner.br{bottom:2rem;right:2rem;transform:scale(-1);}

/* ── center stage ── */
.stage{
  position:relative;z-index:2;
  display:flex;flex-direction:column;
  align-items:center;gap:0;
  text-align:center;
}

/* ── avatar ── */
.avatar-wrap{
  position:relative;
  width:90px;height:90px;
  margin-bottom:1.8rem;
  opacity:0;animation:fadeIn .7s ease .15s forwards;
}
.avatar-ring{
  position:absolute;inset:-8px;border-radius:50%;
  border:1px solid transparent;
  border-top-color:var(--orange);
  border-right-color:rgba(212,98,42,.25);
  animation:spin 2s linear infinite;
}
.avatar-ring::after{
  content:'';position:absolute;inset:5px;border-radius:50%;
  border:1px dashed rgba(139,115,85,.2);
  animation:spin 4s linear infinite reverse;
}
@keyframes spin{to{transform:rotate(360deg)}}

.avatar-circle{
  width:90px;height:90px;border-radius:50%;
  overflow:hidden;
  border:2px solid rgba(240,236,227,.15);
  background:linear-gradient(145deg,#3a3028,#2a2118);
  box-shadow:0 0 0 6px rgba(42,33,24,.6), 0 16px 40px rgba(0,0,0,.4);
  position:relative;z-index:1;
}
.avatar-circle img{
  width:100%;height:100%;
  object-fit:cover;object-position:top;display:block;
}
.avatar-fallback{
  display:none;
  width:100%;height:100%;
  align-items:center;justify-content:center;
  font-family:'Cormorant Garamond',serif;
  font-size:2.2rem;font-weight:300;
  color:rgba(240,236,227,.5);
}

/* ── eyebrow ── */
.eyebrow{
  font-family:'DM Mono',monospace;font-size:.58rem;
  letter-spacing:.35em;text-transform:uppercase;
  color:var(--muted);margin-bottom:1.6rem;
  display:flex;align-items:center;gap:.75rem;
  opacity:0;animation:fadeIn .6s ease .2s forwards;
}
.eyebrow::before,.eyebrow::after{
  content:'';width:2rem;height:1px;
  background:linear-gradient(90deg,transparent,var(--muted));
}
.eyebrow::after{background:linear-gradient(90deg,var(--muted),transparent);}

/* ── main name ── */
.name-wrap{
  overflow:hidden;
  margin-bottom:.5rem;
}
.name-first{
  font-family:'Cormorant Garamond',serif;
  font-size:clamp(3.5rem,10vw,8rem);
  font-weight:200;line-height:.95;
  color:var(--cream);
  letter-spacing:-.02em;
  display:block;
  transform:translateY(110%);
  animation:slideUp .9s cubic-bezier(.16,1,.3,1) .5s forwards;
}
.name-last{
  font-family:'Cormorant Garamond',serif;
  font-size:clamp(3.5rem,10vw,8rem);
  font-weight:200;line-height:.95;
  font-style:italic;
  color:transparent;
  -webkit-text-stroke:1px rgba(240,236,227,.35);
  letter-spacing:-.02em;
  display:block;
  transform:translateY(110%);
  animation:slideUp .9s cubic-bezier(.16,1,.3,1) .65s forwards;
}

/* ── role line ── */
.role{
  font-family:'DM Mono',monospace;font-size:.68rem;
  letter-spacing:.22em;text-transform:uppercase;
  color:var(--orange);margin-top:1.5rem;
  opacity:0;animation:fadeIn .6s ease 1s forwards;
}

/* ── progress ── */
.progress-container{
  margin-top:3rem;
  width:clamp(160px,30vw,260px);
  opacity:0;animation:fadeIn .5s ease 1.1s forwards;
}
.progress-track{
  position:relative;height:1px;
  background:rgba(255,255,255,.08);
  overflow:visible;
}
.progress-fill{
  position:absolute;top:0;left:0;
  height:100%;width:0%;
  background:linear-gradient(90deg,var(--warm-brown),var(--orange));
  transition:width .06s linear;
}
/* glow dot at tip */
.progress-fill::after{
  content:'';position:absolute;right:-1px;top:50%;
  transform:translateY(-50%);
  width:5px;height:5px;border-radius:50%;
  background:var(--orange);
  box-shadow:0 0 8px 2px rgba(212,98,42,.6);
}
.progress-num{
  font-family:'DM Mono',monospace;font-size:.58rem;
  color:var(--muted);text-align:right;
  margin-top:.6rem;letter-spacing:.08em;
}

/* ── bottom tagline ── */
.tagline{
  position:absolute;bottom:2.5rem;
  font-family:'Cormorant Garamond',serif;
  font-size:clamp(.75rem,1.5vw,1rem);
  font-style:italic;font-weight:300;
  color:rgba(139,115,85,.5);
  letter-spacing:.05em;
  opacity:0;animation:fadeIn .8s ease 1.4s forwards;
}

/* ══════════════════════════
   EXIT: CURTAIN WIPE
══════════════════════════ */
.curtain{
  position:fixed;inset:0;z-index:10000;
  background:var(--cream);
  transform:translateY(100%);
  pointer-events:none;
}
.curtain.drop{
  animation:curtainDrop .7s cubic-bezier(.76,0,.24,1) forwards;
}
.curtain.rise{
  animation:curtainRise .6s cubic-bezier(.76,0,.24,1) forwards;
}
@keyframes curtainDrop{
  from{transform:translateY(100%)}
  to{transform:translateY(0%)}
}
@keyframes curtainRise{
  from{transform:translateY(0%)}
  to{transform:translateY(-100%)}
}

/* ── entrance animation helpers ── */
@keyframes slideUp{
  from{transform:translateY(110%)}
  to{transform:translateY(0%)}
}
@keyframes fadeIn{
  from{opacity:0}
  to{opacity:1}
}

/* ══════════════════════════
   MAIN PAGE
══════════════════════════ */
#main-content{
  position:fixed;inset:0;
  opacity:0;background:var(--cream);
  display:flex;align-items:center;justify-content:center;
  font-family:'Cormorant Garamond',serif;
  font-size:1.5rem;font-weight:300;font-style:italic;
  color:var(--warm-brown);
  transition:opacity .4s ease;
}
#main-content.visible{opacity:1;}
</style>
</head>
<body>

<!-- curtain element -->
<div class="curtain" id="curtain"></div>

<!-- ══ LOADER ══ -->
<div id="loader">
  <div class="corner tl"></div>
  <div class="corner tr"></div>
  <div class="corner bl"></div>
  <div class="corner br"></div>

  <div class="stage">
    <div class="eyebrow">Portfolio</div>

    <!-- avatar -->
    <div class="avatar-wrap">
      <div class="avatar-ring"></div>
      <div class="avatar-circle">
        <!-- swap src with your actual image path -->
        <img src="/assets/home/profile-img.jpg" alt="Avishek Devnath" onerror="this.style.display='none';this.parentElement.querySelector('.avatar-fallback').style.display='flex'">
        <div class="avatar-fallback">A</div>
      </div>
    </div>

    <div class="name-wrap">
      <span class="name-first">Avishek</span>
    </div>
    <div class="name-wrap">
      <span class="name-last">Devnath</span>
    </div>

    <div class="role">Software Engineer &nbsp;·&nbsp; Backend &amp; System Design</div>

    <div class="progress-container">
      <div class="progress-track">
        <div class="progress-fill" id="progressFill"></div>
      </div>
      <div class="progress-num" id="progressNum">0%</div>
    </div>
  </div>

  <div class="tagline">"Building systems that last."</div>
</div>

<!-- ══ YOUR PAGE ══ -->
<div id="main-content">
  ← Your page renders here
</div>

<script>
const fill    = document.getElementById('progressFill');
const num     = document.getElementById('progressNum');
const loader  = document.getElementById('loader');
const curtain = document.getElementById('curtain');
const main    = document.getElementById('main-content');

let pct = 0, done = false;

function tick() {
  if (done) return;
  const step = pct < 50
    ? Math.random() * 9 + 4
    : pct < 80
      ? Math.random() * 5 + 2
      : Math.random() * 2 + .5;

  pct = Math.min(pct + step, 99);
  fill.style.width = pct + '%';
  num.textContent  = Math.floor(pct) + '%';
  setTimeout(tick, Math.random() * 130 + 50);
}

tick();

function finish() {
  if (done) return;
  done = true;

  // snap to 100
  pct = 100;
  fill.style.width = '100%';
  num.textContent  = '100%';

  // brief pause at 100 → curtain drops → reveal page → curtain rises
  setTimeout(() => {
    curtain.classList.add('drop');

    setTimeout(() => {
      loader.style.display = 'none';
      main.classList.add('visible');
      curtain.classList.remove('drop');
      curtain.classList.add('rise');

      setTimeout(() => curtain.remove(), 700);
    }, 700);

  }, 350);
}

const start   = Date.now();
const minWait = 2200;

window.addEventListener('load', () => {
  const elapsed = Date.now() - start;
  setTimeout(finish, Math.max(0, minWait - elapsed));
});

// hard fallback
setTimeout(finish, 4000);
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Header</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,400&family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }
body {
  font-family: 'DM Sans', sans-serif;
  background: #f0ece3;
  min-height: 200vh; /* so you can test scroll shrink */
}

/* ── STICKY WRAPPER ── */
.nav-wrap {
  position: sticky;
  top: 0;
  z-index: 200;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding-top: 1.25rem;
  transition: padding-top 0.3s ease;
}
.nav-wrap.scrolled { padding-top: .6rem; }

/* ── CAPSULE BAR ── */
.nav-capsule {
  width: 100%;
  max-width: 72%;
  background: rgba(252, 248, 248, 0.92);
  backdrop-filter: blur(16px);
  -webkit-backdrop-filter: blur(16px);
  border: 1px solid rgba(220, 210, 195, 0.7);
  border-radius: 9999px;
  box-shadow: 0 1px 3px rgba(0,0,0,.05), 0 4px 14px rgba(0,0,0,.07);
  transition: box-shadow 0.3s ease, padding 0.3s ease;
}
.nav-capsule:hover {
  box-shadow: 0 2px 6px rgba(0,0,0,.07), 0 8px 22px rgba(0,0,0,.09);
}
.nav-wrap.scrolled .nav-capsule {
  box-shadow: 0 2px 8px rgba(0,0,0,.08), 0 10px 28px rgba(0,0,0,.1);
}

.nav-inner {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 1rem;
  padding: .55rem 1.25rem;
  transition: padding 0.3s ease;
}
.nav-wrap.scrolled .nav-inner { padding: .45rem 1.25rem; }

/* ── LOGO ── */
.nav-logo {
  display: flex;
  align-items: center;
  gap: .6rem;
  text-decoration: none;
  flex-shrink: 0;
  transition: opacity 0.2s;
}
.nav-logo:hover { opacity: .82; }
.nav-logo:hover .logo-avatar { border-color: #fb923c; }
.nav-logo:hover .logo-name   { color: #ea580c; }

.logo-avatar {
  width: 38px; height: 38px;
  border-radius: 50%;
  border: 2px solid #e5e0d8;
  overflow: hidden;
  flex-shrink: 0;
  background: linear-gradient(135deg, #e8e2d6, #c9b99a);
  display: flex; align-items: center; justify-content: center;
  transition: border-color 0.25s;
  font-size: 1.1rem;
}
.logo-avatar img { width: 100%; height: 100%; object-fit: cover; display: block; }

.logo-name {
  font-family: 'DM Sans', sans-serif;
  font-size: 1.1rem;
  font-weight: 700;
  letter-spacing: -.01em;
  color: #2a2118;
  white-space: nowrap;
  transition: color 0.2s;
}

/* ── DESKTOP NAV LINKS ── */
.nav-links {
  display: flex;
  align-items: center;
  gap: .2rem;
  list-style: none;
}

.nav-link {
  position: relative;
  padding: .42rem .85rem;
  border-radius: 9999px;
  font-size: .88rem;
  font-weight: 500;
  color: #5a4a3a;
  text-decoration: none;
  white-space: nowrap;
  transition: color 0.2s, background 0.2s;
}
.nav-link:hover {
  color: #ea580c;
  background: rgba(234,88,12,.06);
}
.nav-link.active {
  color: #ea580c;
  background: rgba(234,88,12,.07);
}
/* active dot */
.nav-link.active::after {
  content: '';
  position: absolute;
  bottom: 3px;
  left: 50%;
  transform: translateX(-50%);
  width: 4px; height: 4px;
  border-radius: 50%;
  background: #fb923c;
}

/* external icon */
.ext-icon {
  display: inline-block;
  width: 9px; height: 9px;
  margin-left: 2px;
  vertical-align: middle;
  opacity: .45;
}

/* ── HIRE ME CTA ── */
.nav-hire {
  position: relative;
  overflow: hidden;
  padding: .42rem 1.1rem;
  border-radius: 9999px;
  border: 2px solid #fb923c;
  background: #ffeade;
  color: #c2410c;
  font-size: .88rem;
  font-weight: 600;
  text-decoration: none;
  white-space: nowrap;
  margin-left: .3rem;
  transition: background 0.25s, box-shadow 0.2s, transform 0.2s;
}
.nav-hire:hover {
  background: #ffe0cc;
  box-shadow: 0 3px 10px rgba(251,146,60,.28);
  transform: translateY(-1px);
}
/* shine sweep */
.nav-hire::after {
  content: '';
  position: absolute;
  inset: 0;
  background: linear-gradient(105deg, transparent 30%, rgba(255,255,255,.45) 50%, transparent 70%);
  transform: translateX(-130%);
  transition: transform 0.55s ease;
  pointer-events: none;
}
.nav-hire:hover::after { transform: translateX(130%); }

/* ── BURGER ── */
.burger {
  display: none;
  flex-direction: column;
  justify-content: center;
  gap: 5px;
  width: 36px; height: 36px;
  border-radius: 50%;
  border: none;
  background: none;
  cursor: pointer;
  padding: .4rem;
  transition: background 0.2s;
  align-items: center;
}
.burger:hover { background: rgba(0,0,0,.05); }
.burger span {
  display: block;
  height: 2px;
  background: #4a3728;
  border-radius: 2px;
  transition: all 0.3s ease;
  transform-origin: left center;
}
.burger span:nth-child(1) { width: 20px; }
.burger span:nth-child(2) { width: 16px; }
.burger span:nth-child(3) { width: 12px; }
/* open state */
.burger.open span:nth-child(1) { width: 20px; transform: rotate(45deg) translateY(-1px); }
.burger.open span:nth-child(2) { opacity: 0; transform: translateX(6px); }
.burger.open span:nth-child(3) { width: 20px; transform: rotate(-45deg) translateY(1px); }

/* ── MOBILE DROPDOWN ── */
.nav-mobile {
  width: 100%;
  max-width: 72%;
  margin-top: .5rem;
  background: rgba(252, 248, 248, 0.97);
  backdrop-filter: blur(16px);
  -webkit-backdrop-filter: blur(16px);
  border: 1px solid rgba(220, 210, 195, 0.7);
  border-radius: 1.1rem;
  box-shadow: 0 4px 20px rgba(0,0,0,.1);
  overflow: hidden;
  max-height: 0;
  opacity: 0;
  pointer-events: none;
  transition: max-height 0.35s ease, opacity 0.25s ease, margin-top 0.25s ease;
}
.nav-mobile.open {
  max-height: 500px;
  opacity: 1;
  pointer-events: auto;
}

.mobile-list {
  list-style: none;
  padding: .7rem .7rem;
  display: flex;
  flex-direction: column;
  gap: 2px;
}
.mobile-link {
  display: flex;
  align-items: center;
  justify-content: space-between;
  text-decoration: none;
  color: #4a3728;
  font-size: .9rem;
  font-weight: 500;
  padding: .65rem 1rem;
  border-radius: .7rem;
  transition: background 0.18s, color 0.18s;
}
.mobile-link:hover { background: rgba(234,88,12,.06); color: #ea580c; }
.mobile-link.active { background: rgba(234,88,12,.07); color: #ea580c; }
.mobile-link.active .m-dot {
  width: 6px; height: 6px;
  border-radius: 50%;
  background: #fb923c;
  margin-left: auto;
}
.mobile-hire {
  background: #ffeade;
  color: #c2410c;
  border: 2px solid #fb923c;
  border-radius: 9999px;
  justify-content: center;
  font-weight: 600;
  margin-top: .3rem;
  transition: background 0.2s, box-shadow 0.2s;
}
.mobile-hire:hover { background: #ffe0cc; box-shadow: 0 2px 8px rgba(251,146,60,.22); color: #c2410c; }

/* ── RESPONSIVE ── */
@media (max-width: 1024px) {
  .nav-links { display: none; }
  .burger { display: flex; }
  .nav-capsule, .nav-mobile { max-width: 92%; }
}
@media (max-width: 640px) {
  .nav-capsule, .nav-mobile { max-width: 96%; }
  .logo-name { font-size: 1rem; }
}

/* ── demo page padding ── */
.page-content {
  padding: 6rem 2rem 2rem;
  text-align: center;
  font-family: 'Cormorant Garamond', serif;
  font-size: 2rem;
  font-weight: 300;
  color: #8b7355;
  opacity: .4;
}
</style>
</head>
<body>

<!-- ══ STICKY HEADER ══ -->
<div class="nav-wrap" id="navWrap">

  <!-- Capsule bar -->
  <header class="nav-capsule" role="banner">
    <div class="nav-inner">

      <!-- Logo -->
      <a href="/" class="nav-logo">
        <div class="logo-avatar">
          <!-- swap with <img src="..." alt="Avishek"> once you have the photo -->
          👤
        </div>
        <span class="logo-name">Avishek</span>
      </a>

      <!-- Desktop links -->
      <nav aria-label="Main navigation">
        <ul class="nav-links">
          <li><a href="/"         class="nav-link active">Home</a></li>
          <li><a href="/about"    class="nav-link">About</a></li>
          <li><a href="/projects" class="nav-link">Projects</a></li>
          <li><a href="/blogs"    class="nav-link">Blog</a></li>
          <li>
            <a href="https://aitoolbox-v1.vercel.app/" class="nav-link" target="_blank" rel="noopener noreferrer">
              Tools
              <svg class="ext-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5"
                  d="M10 6H6a2 2 0 00-2 2v10a2 2 0 002 2h10a2 2 0 002-2v-4M14 4h6m0 0v6m0-6L10 14"/>
              </svg>
            </a>
          </li>
          <li><a href="/contact"  class="nav-link">Contact</a></li>
          <li><a href="/hire-me"  class="nav-hire">Hire Me</a></li>
        </ul>
      </nav>

      <!-- Burger -->
      <button class="burger" id="burger" aria-label="Toggle menu" aria-expanded="false">
        <span></span><span></span><span></span>
      </button>

    </div>
  </header>

  <!-- Mobile dropdown -->
  <nav class="nav-mobile" id="mobileMenu" aria-label="Mobile navigation">
    <ul class="mobile-list">
      <li><a href="/"         class="mobile-link active">Home <span class="m-dot"></span></a></li>
      <li><a href="/about"    class="mobile-link">About</a></li>
      <li><a href="/projects" class="mobile-link">Projects</a></li>
      <li><a href="/blogs"    class="mobile-link">Blog</a></li>
      <li>
        <a href="https://aitoolbox-v1.vercel.app/" class="mobile-link" target="_blank" rel="noopener noreferrer">
          Tools
          <svg style="width:11px;height:11px;opacity:.4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5"
              d="M10 6H6a2 2 0 00-2 2v10a2 2 0 002 2h10a2 2 0 002-2v-4M14 4h6m0 0v6m0-6L10 14"/>
          </svg>
        </a>
      </li>
      <li><a href="/contact"  class="mobile-link">Contact</a></li>
      <li><a href="/hire-me"  class="mobile-link mobile-hire">Hire Me</a></li>
    </ul>
  </nav>

</div>

<!-- Demo content so scroll works -->
<div class="page-content">Scroll down to see the header shrink ↓</div>

<script>
const burger     = document.getElementById('burger');
const mobileMenu = document.getElementById('mobileMenu');
const navWrap    = document.getElementById('navWrap');

// ── Toggle mobile menu ──
burger.addEventListener('click', () => {
  const open = mobileMenu.classList.toggle('open');
  burger.classList.toggle('open', open);
  burger.setAttribute('aria-expanded', open);
});

// ── Close on outside click ──
document.addEventListener('mousedown', (e) => {
  if (!navWrap.contains(e.target)) {
    mobileMenu.classList.remove('open');
    burger.classList.remove('open');
    burger.setAttribute('aria-expanded', 'false');
  }
});

// ── Scroll shrink ──
window.addEventListener('scroll', () => {
  navWrap.classList.toggle('scrolled', window.scrollY > 20);
}, { passive: true });

// ── Active link (simple path match) ──
const path = window.location.pathname;
document.querySelectorAll('.nav-link, .mobile-link').forEach(link => {
  const href = link.getAttribute('href');
  if (!href || href.startsWith('http')) return;
  const isActive = href === '/' ? path === '/' : path.startsWith(href);
  link.classList.toggle('active', isActive);
  // add dot span for mobile active
  if (isActive && link.classList.contains('mobile-link') && !link.querySelector('.m-dot')) {
    const dot = document.createElement('span');
    dot.className = 'm-dot';
    link.appendChild(dot);
  }
});
</script>
</body>
</html>
